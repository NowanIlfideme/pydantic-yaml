name: Run Tests

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions (e.g., ['earliest', '3.13', 'latest'])"
        required: true
        type: string
      dependency-resolution:
        description: "JSON array of uv resolution modes (out of ['lowest', 'lowest-direct' and 'highest'])"
        required: true
        type: string
      dep-groups:
        description: "JSON array of dependency groups to test"
        required: true
        type: string
      fail-fast:
        description: "Whether to fail fast on first test failure"
        required: false
        type: boolean
        default: false

env:
  gha-uv-version: "0.11.23"

jobs:
  resolve-versions:
    name: "Resolve Python Versions"
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.resolve.outputs.python-versions }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version keywords
        id: resolve
        run: |
          # Parse pyproject.toml to get Python version requirements
          requires_python=$(grep 'requires-python' pyproject.toml | sed 's/.*requires-python[[:space:]]*=[[:space:]]*"\(.*\)".*/\1/')

          # Extract minimum version (e.g., ">=3.10" -> "3.10")
          min_version=$(echo "$requires_python" | sed 's/.*>=//' | sed 's/[,<].*//')

          # Get latest stable Python version from endoflife.date API
          latest_version=$(curl -s 'https://endoflife.date/api/python.json' | \
            grep -o '"cycle":"[^"]*' | head -1 | sed 's/"cycle":"//')

          # Fallback to 3.14 if API call fails
          latest_version=${latest_version:-3.14}

          # Resolve version keywords using jq for safe JSON manipulation
          python_specs=$(echo '${{ inputs.python-versions }}' | jq \
            --arg min "$min_version" \
            --arg latest "$latest_version" \
            'map(if . == "earliest" then $min elif . == "latest" then $latest else . end)')

          echo "python-versions=$python_specs" >> "$GITHUB_OUTPUT"

  test:
    name: "Test"
    needs: resolve-versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix:
        python-version: ${{ fromJson(needs.resolve-versions.outputs.python-versions) }}
        dep-groups: ${{ fromJson(inputs.dep-groups) }}
        dependency-resolution: ${{ fromJson(inputs.dependency-resolution) }}
    steps:
      - uses: actions/checkout@v7

      - name: "Install uv and python ${{ matrix.python-version }}"
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          version: ${{ env.gha-uv-version }}

      - name: "Sync dependencies (${{ matrix.dependency-resolution }})"
        run: |
          uv sync ${{ matrix.dep-groups }} --resolution ${{ matrix.dependency-resolution }}

      - name: Lint with ruff
        run: |
          uv run ruff check .
      - name: Test with pytest
        run: |
          uv run pytest
      - name: Test with mypy
        run: |
          uv run mypy -p pydantic_yaml
