# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# To be migrated to Zensical
mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: false

# Using uv to build, see:
# https://docs.readthedocs.com/platform/stable/build-customization.html#install-dependencies-with-uv
build:
  os: "ubuntu-24.04"
  tools:
    python: "3.10"
  jobs:
    pre_create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    create_environment:
      - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
    install:
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --frozen --group docs --group dev
